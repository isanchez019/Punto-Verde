<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Punto Verde | Eco-Sistema Final Profesional</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="login-overlay" class="overlay">
    <div class="glass-card login-box">
        <div class="brand">
            <h1 class="main-title">Punto Verde</h1>
            <p>Sostenibilidad con Propósito</p>
        </div>
        <div class="input-group">
            <input id="login-nombre" type="text" placeholder="Nombre completo">
            <input id="login-email" type="email" placeholder="Correo electrónico">
            <input id="login-password" type="password" placeholder="Contraseña">
        </div>
        <button class="btn-orange-glow" onclick="loginInicial()">COMENZAR</button>
    </div>
</div>

<div id="app-structure" style="display: none;">
    <div class="sidebar">
        <div class="sidebar-header">
            <h2 class="logo-text">🌱 PUNTO <span>VERDE</span></h2>
        </div>
        <nav class="nav-menu">
            <button class="nav-item active" onclick="mostrar('perfil')"><i class="fas fa-user-circle"></i> Mi Perfil</button>
            <button class="nav-item" onclick="mostrar('reciclaje')"><i class="fas fa-recycle"></i> Reciclar</button>
            <button class="nav-item" onclick="mostrar('mapa')"><i class="fas fa-map-marked-alt"></i> Mapa de Centros</button>
            <button class="nav-item" onclick="mostrar('catalogo')"><i class="fas fa-shopping-bag"></i> Recompensas</button>
        </nav>
        <div class="sidebar-footer">
            <button onclick="accesoAdmin()" class="btn-sidebar-admin">Admin</button>
            <button onclick="location.reload()" class="btn-sidebar-logout">Salir</button>
        </div>
    </div>

    <main class="main-layout">
        <div id="perfil" class="glass-card page-card">
            <div class="header-flex">
                <h2>Estado de Cuenta</h2>
                <button class="btn-edit-data" onclick="toggleEdit()"><i class="fas fa-user-edit"></i> Modificar Datos</button>
            </div>
            
            <div id="edit-panel" class="edit-box" style="display:none;">
                <h3>Actualizar Perfil (RF-03)</h3>
                <input id="edit-nombre" type="text" placeholder="Nuevo nombre">
                <input id="edit-email" type="email" placeholder="Nuevo correo">
                <button class="btn-orange-glow" onclick="guardarCambios()">Guardar Cambios</button>
            </div>

            <div class="profile-hero">
                <div class="points-badge">
                    <span id="u-puntos">0</span>
                    <small>Eco-Puntos</small>
                </div>
                <div class="user-details">
                    <p><strong>ID Usuario:</strong> <span id="u-id"></span></p>
                    <p><strong>Titular:</strong> <span id="u-nombre"></span></p>
                    <p><strong>Email:</strong> <span id="u-email"></span></p>
                </div>
            </div>
        </div>

        <div id="reciclaje" class="glass-card page-card" style="display:none;">
            <h2>Nueva Entrega</h2>
            <div class="eco-form">
                <select id="r-material">
                    <option>Plásticos (PET/HDPE)</option>
                    <option>Metales y Aluminio</option>
                    <option>Papel/Cartón</option>
                </select>
                <input id="r-cantidad" type="number" placeholder="Peso Estimado en Kg">
                <button class="btn-orange-glow" onclick="ejecutarRegistro()">Enviar Solicitud</button>
            </div>
        </div>

        <div id="mapa" class="glass-card page-card" style="display:none;">
            <h2>Centros en San Pedro (Mapa Real)</h2>
            <div id="real-map"></div>
            <div id="map-info-points" class="locations-grid"></div>
        </div>

        <div id="catalogo" class="glass-card page-card" style="display:none;">
            <h2>Catálogo de Recompensas con Código Único</h2>
            <div id="aliados-grid" class="partners-grid"></div>
        </div>

        <div id="admin" class="glass-card page-card" style="display:none;">
            <h2>Validaciones Pendientes</h2>
            <div id="lista-pendientes"></div>
        </div>
    </main>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="script.js"></script>
</body>
</html>
